<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
</head>
<body style="text-align: center; font-family: Arial;">
    <h2>Student Performance Prediction</h2>
    <form method="POST">
        {% csrf_token %}
        <input type="number" name="study_hours" placeholder="Study Hours" required><br><br>
        <input type="number" name="attendance" placeholder="Attendance (%)" required><br><br>
        <input type="number" name="prev_score" placeholder="Previous Score" required><br><br>
        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <h3>Result: {{ result }}</h3>
    {% endif %}
</body>
</html>
