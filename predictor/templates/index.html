<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Predictor | AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: white;
            margin-top: 50px;
        }
        .header-section {
            background: #4e73df;
            color: white;
            padding: 30px;
            border-radius: 15px 15px 0 0;
            text-align: center;
        }
        .btn-predict {
            background: #4e73df;
            color: white;
            border: none;
            padding: 12px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-predict:hover {
            background: #2e59d9;
            color: white;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card main-card">
                <div class="header-section">
                    <h3>🎓 Student Success AI</h3>
                    <p class="mb-0">ML Based Performance Prediction</p>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Study Hours (Daily)</label>
                            <input type="number" step="0.1" name="study_hours" class="form-control" placeholder="e.g. 7.5" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Attendance (%)</label>
                            <input type="number" name="attendance" class="form-control" placeholder="e.g. 85" min="0" max="100" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Previous Score</label>
                            <input type="number" name="prev_score" class="form-control" placeholder="e.g. 70" required>
                        </div>
                        <button type="submit" class="btn btn-predict w-100 mt-2">Check Prediction</button>
                    </form>

                    {% if result %}
                        <div class="result-box {% if 'Pass' in result %}alert-success text-success{% else %}alert-danger text-danger{% endif %}">
                            <h4 class="mb-0">Result: {{ result }}</h4>
                        </div>
                    {% endif %}
                </div>
            </div>
            <p class="text-center text-muted mt-4"><small>Powered by Machine Learning & Azure</small></p>
        </div>
    </div>
</div>

</body>
</html>
